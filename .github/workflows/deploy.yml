name: Build data and deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "data/Event_Data.xlsx"
      - "scripts/**"
      - "src/**"
      - "package.json"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build data (xlsx -> JSON)
        run: npm run build-data

      - name: Copy generated data into site
        run: |
          mkdir -p src/data
          cp data/generated/*.json src/data/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
